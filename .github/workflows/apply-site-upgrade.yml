name: Aplicar atualização do site

on:
  push:
    branches: [main]
    paths:
      - upgrade-site.mjs
      - .github/workflows/apply-site-upgrade.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Aplicar atualização
        run: node upgrade-site.mjs

      - name: Publicar arquivos gerados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nenhuma alteração adicional encontrada."
            exit 0
          fi
          git commit -m "Melhora navegação, SEO e portfólio"
          git push origin main
