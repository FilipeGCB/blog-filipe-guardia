name: Publicar site no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        id: configure
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Preparar arquivos estáticos
        id: upload
        if: always()
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publicar
        id: deployment
        if: always() && steps.upload.outcome == 'success'
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Registrar resultado
        if: always()
        run: |
          {
            echo "commit=${GITHUB_SHA}"
            echo "configure=${{ steps.configure.outcome }}"
            echo "upload=${{ steps.upload.outcome }}"
            echo "deploy=${{ steps.deployment.outcome }}"
            echo "page_url=${{ steps.deployment.outputs.page_url }}"
            echo "executado_em=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > pages-deploy-status.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages-deploy-status.txt
          git commit -m "Registra resultado da publicação do Pages" || true
          git push origin main
